on_turn_completed = true
on_tool_completed = true
on_tool_failed = true
delta_events = 12
cooldown_ms = 0

[intervention]
max_queued_items_per_thread = 4
skill_context_push = "off"

[skills]
enabled = false
allowed_skill_ids = []
push_when_confident = false

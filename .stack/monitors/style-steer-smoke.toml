[monitor]
id = "style-steer-smoke"
label = "Style Steer Smoke"
enabled = true
mode = "observe_summarize_queue_steer"
policy = "conservative"
strictness = "aggressive"

[focus]
selection = "any"
style = true
goal_progress = false
skills = false
tool_use = true
scope_control = true
acceptance = false

[model]
provider = "openai"
model = "gpt-5.4-mini"

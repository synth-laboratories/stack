name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: bun install
      - name: Version drift check
        run: bun run scripts/check_version_drift.ts
      - name: Typecheck and build stackd
        run: bun run check

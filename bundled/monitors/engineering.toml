[monitor]
id = "engineering"
label = "Engineering monitor"
enabled = true
activity_density = "quiet"

[model]
provider = "openai"
model = "gpt-5.4-mini"
reasoning_effort = "medium"

[prompt]
system_file = ".stack/monitors/engineering.system.md"

[skills]
enabled = true
allowed_skill_ids = ["synth-stack-productivity", "synth-via-stack", "synth-ai", "oss-gepa", "hosted-gepa", "containers", "containers-coding", "stack-agent-bridge", "gepa"]
push_when_confident = false

[tools]
allow = ["guidance.search", "skills.push_context", "skills.suggest", "monitor.queue", "monitor.steer", "stack_status", "stack_runtime_status", "stack_list_remote_projects", "stack_launch_gepa", "stack_list_hosted_artifacts", "stack_get_run_artifact_status", "stack_open_hosted_artifact", "stack_list_run_work_products", "stack_download_work_product", "stack_monitor_goal_status", "stack_sidecar_pause_for_restart", "stack_meta_thread_set_title", "stack_ui_open_panel", "stack_ui_close_panel"]
deny = ["codex.interrupt"]

[permissions]
queue = true
steer = true
skill_push = true
pause_worker = false
block_before_action = false

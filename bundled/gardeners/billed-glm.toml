[actor]
id = "billed-glm"
label = "Gardener (Synth GLM)"
enabled = true
role = "gardener"

[gardener]
id = "billed-glm"
label = "Gardener (Synth GLM)"
enabled = true

[prompt]
system_file = ".stack/gardeners/default.system.md"

[model]
provider = "synth_inference"
model = "glm-5.2"
reasoning_effort = "low"

[tools]
allow = ["gardener.inbox", "gardener.route", "gardener.steer", "gardener.queue", "gardener.garden_rewrite", "skills.register", "skills.suggest", "stack_status", "stack_runtime_status", "stack_list_remote_projects", "stack_list_live_smrs", "stack_list_factories", "stack_list_hosted_optimizer_runs", "stack_inference_catalog", "stack_inference_usage", "stack_remote_gardener_handoff", "stack_ui_open_panel", "stack_ui_close_panel", "jsk.papercut", "handoff.force", "handoff.seal", "handoff.approve", "handoff.continue"]
deny = ["codex.interrupt"]

[permissions]
inbox = true
route = true
steer = true
queue = true
papercut_mirror = true
pause_worker = false
meta_thread_lifecycle = true
meta_thread_title = true

[wake]
on_turn_completed = true
idle_ms = 300000
on_inbox_pending = true
on_garden_dirty = true
